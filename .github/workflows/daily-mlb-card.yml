name: Daily MLB Training + Card

on:
  workflow_dispatch:
  schedule:
    - cron: "29 11 * * *" # 7:30 AM ET during EDT

permissions:
  contents: write

jobs:
  daily-training-card:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MLB

    env:
      PYTHONPATH: src
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build training artifacts
        run: |
          python -m jobs.build_training_artifacts

      - name: Run daily card
        run: |
          python -m jobs.run_daily_card

      - name: Commit official picks history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/tracking/official_picks_history.csv; then
            echo "No official picks history changes to commit."
            exit 0
          fi

          git add data/tracking/official_picks_history.csv
          git commit -m "Update official picks history"
          git push
      
      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python -c '
          import os
          from notifications.discord import DiscordNotification, send_discord_notification
          send_discord_notification(
              DiscordNotification(
                  status=os.getenv("JOB_STATUS", "unknown"),
                  run_url=os.getenv("RUN_URL"),
              )
          )
          '
          
      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-mlb-card-output
          if-no-files-found: warn
          path: |
            MLB/data/artifacts/latest/
            MLB/data/artifacts/previous/
            MLB/data/inputs/starters/
            MLB/data/outputs/
            MLB/data/tracking/
