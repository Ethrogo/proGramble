name: Daily MLB Card

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
      timezone: 'America/New_York'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-card:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MLB

    env:
      PYTHONPATH: src
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: MLB/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily card
        run: |
          python -m jobs.run_daily_card

      - name: List MLB files
        if: always()
        run: |
          pwd
          find . -maxdepth 5 -type f | sort

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: daily-mlb-card-output
          if-no-files-found: warn
          path: |
            MLB/data/inputs/starters/today_starters.csv
            MLB/data/outputs/projections/today_projections.csv
            MLB/data/outputs/edges/today_joined_edges.csv
            MLB/data/outputs/picks/today_all_picks.csv
            MLB/data/outputs/picks/today_postable_picks.csv