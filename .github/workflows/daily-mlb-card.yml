name: Daily MLB Training + Card

on:
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * *" # 7:30 AM ET during EDT

jobs:
  daily-training-card:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MLB

    env:
      PYTHONPATH: src
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas requests pybaseball xgboost python-dotenv

      - name: Build training artifacts
        run: |
          python -m jobs.build_training_artifacts

      - name: Run daily card
        run: |
          python -m jobs.run_daily_card

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-mlb-card-output
          if-no-files-found: warn
          path: |
            MLB/data/artifacts/model.ubj
            MLB/data/artifacts/pitcher_games.csv
            MLB/data/artifacts/model_df.csv
            MLB/data/inputs/starters/today_starters.csv
            MLB/data/outputs/projections/today_projections.csv
            MLB/data/outputs/edges/today_joined_edges.csv
            MLB/data/outputs/picks/today_all_picks.csv
            MLB/data/outputs/picks/today_postable_picks.csv